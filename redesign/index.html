<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <style type="text/css">
            html,body{
                height: 100%;
                margin: 0;
            }
            #main0{
                width: 1000px;
                height: 100%;
                margin: 0 auto;
                position: relative;
                overflow: hidden;
            }
            #main1{
                width: 593px;
                position:absolute;
                top: 0; left: 266px;
                padding-top: 34px;
                overflow: hidden;
                height: 100%;
            }
            #main{
                width: 900px;
                position:absolute;
                overflow-x: hidden;
                overflow-y: scroll;
                height: 100%;
            }
            #right{
                width: 200px;
                overflow: scroll;
                height: 100%;
                overflow-x: hidden;
            }
            #right0{
                width: 140px;
                height: 100%;
                float: right;
                position: absolute;
                top: 0; right: 0;
                overflow: hidden;
            }
            #ifr{
                width: 100%;
                height: 100%;
            }
            #top{
                position: absolute;
                top: 0; left: 0;
                width: 860px;
                height: 33px;
            }
            #left{
                position: absolute;
                top: 33px;
                left:0;
                height: 100%;
                width: 263px;
                overflow: hidden;
            }
            #left0{
                width: 500px;
                overflow: scroll;
                height: 100%;
                overflow-x: hidden;
            }
        </style>
    </head>
    <body>
        <div id="main0">
            <div id="top"><img src="top.jpg"></div>
            <div id="left">
                <div id="left0">
                    <img src="left.jpg">
                </div>
            </div>
            <div id="main1">
                <div id="main">
                    <img src="search.jpg">
                    <img src="banner.jpg">
                    <img src="content.jpg">
                </div>
            </div>
            <div id="right0">
                <div id="right">
                    <img src="right.jpg">
                </div>
            </div>
        </div>
    </body>
</html>
